version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: firstclub-db
    environment:
      POSTGRES_DB: firstclub_membership
      POSTGRES_USER: firstclub
      POSTGRES_PASSWORD: firstclub_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U firstclub -d firstclub_membership"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
